name: Refresh star counts

on:
  schedule:
    - cron: "0 7 * * 1"     # every Monday 07:00 UTC
  workflow_dispatch: {}
  push:
    paths:
      - "data/items.json"
      - "data/collections.json"
      - "build.py"
      - "templates/**"

permissions:
  contents: write

concurrency:
  group: refresh-stars
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Validate data
        run: python build.py --check

      - name: Fetch live star counts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python fetch_stars.py --date "$(date -u +%Y-%m-%d)"

      - name: Rebuild README + site data
        run: python build.py --date "$(date -u +%Y-%m-%d)"

      - name: Commit refreshed data
        run: |
          git config user.name "star-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add README.md data/stars.json docs/data.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: weekly star-count refresh [skip ci]"
            git push
          fi
